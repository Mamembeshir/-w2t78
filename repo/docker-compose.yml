services:

  # ── MySQL 8 ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev_root_pw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-warehouse_db}
      MYSQL_USER: ${MYSQL_USER:-warehouse_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-warehouse_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-dev_root_pw}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Django Backend (dev: runserver with auto-reload) ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-warehouse_db}
      DB_USER: ${DB_USER:-warehouse_user}
      DB_PASSWORD: ${DB_PASSWORD:-warehouse_pass}
      DB_PORT: ${DB_PORT:-3306}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-replace-before-any-real-use}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Use Django's dev server so code changes are picked up without a restart.
    # Production (docker-compose.prod.yml) overrides this with Gunicorn.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_users &&
             python manage.py runserver 0.0.0.0:8000"

  # ── Celery Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-warehouse_db}
      DB_USER: ${DB_USER:-warehouse_user}
      DB_PASSWORD: ${DB_PASSWORD:-warehouse_pass}
      DB_PORT: ${DB_PORT:-3306}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-replace-before-any-real-use}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=4
        --queues=default,crawl.0,crawl.1,crawl.2,crawl.3,inventory,notifications

  # ── Celery Beat (Scheduled Tasks) ─────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-warehouse_db}
      DB_USER: ${DB_USER:-warehouse_user}
      DB_PASSWORD: ${DB_PASSWORD:-warehouse_pass}
      DB_PORT: ${DB_PORT:-3306}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-replace-before-any-real-use}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A config beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── React Frontend (Vite dev server) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      # Keep node_modules from host override (anonymous volume trick)
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
