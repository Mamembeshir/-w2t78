services:

  # ── MySQL 8 ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev_root_pw}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-warehouse_db}
      MYSQL_USER:          ${MYSQL_USER:-warehouse_user}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-warehouse_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-dev_root_pw}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Django Backend ─────────────────────────────────────────────────────────
  # Runs migrate + seed_users before starting the server, so the healthcheck
  # below only passes once the schema is fully initialised.  Worker, beat, and
  # frontend all gate on this healthcheck so they never start with a partial DB.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DEBUG:                "True"
      DB_HOST:              db
      DB_NAME:              ${DB_NAME:-warehouse_db}
      DB_USER:              ${DB_USER:-warehouse_user}
      DB_PASSWORD:          ${DB_PASSWORD:-warehouse_pass}
      DB_PORT:              ${DB_PORT:-3306}
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY:-insecure-dev-key-do-not-use-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0,host.docker.internal}
      REDIS_URL:            redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_users &&
             python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

  # ── Celery Worker ──────────────────────────────────────────────────────────
  # Depends on backend being healthy so migrations are guaranteed complete
  # before the worker imports any models.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DEBUG:                "True"
      DB_HOST:              db
      DB_NAME:              ${DB_NAME:-warehouse_db}
      DB_USER:              ${DB_USER:-warehouse_user}
      DB_PASSWORD:          ${DB_PASSWORD:-warehouse_pass}
      DB_PORT:              ${DB_PORT:-3306}
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY:-insecure-dev-key-do-not-use-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0,host.docker.internal}
      REDIS_URL:            redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=4
        --queues=default,crawl.0,crawl.1,crawl.2,crawl.3,inventory,notifications

  # ── Celery Beat ────────────────────────────────────────────────────────────
  # DatabaseScheduler reads django_celery_beat_* tables — these only exist
  # after backend runs migrate.  Gate on backend healthy to prevent the crash.
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DEBUG:                "True"
      DB_HOST:              db
      DB_NAME:              ${DB_NAME:-warehouse_db}
      DB_USER:              ${DB_USER:-warehouse_user}
      DB_PASSWORD:          ${DB_PASSWORD:-warehouse_pass}
      DB_PORT:              ${DB_PORT:-3306}
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY:-insecure-dev-key-do-not-use-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0,host.docker.internal}
      REDIS_URL:            redis://redis:6379/0
      CELERY_BROKER_URL:    redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: >
      celery -A config beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── React Frontend (Vite dev server) ──────────────────────────────────────
  # Gates on backend healthy so the API is reachable when the UI loads.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
